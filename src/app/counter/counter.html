<div>
  <h1>Counter component</h1>
  <div class="center">
    <h2>{{ countervalue }}</h2>
  </div>
  <div class="center">
    <button class="btn btn-red" (click)="handleCounter('plus')">Increament</button>
    <button class="btn btn-black" (click)="handleCounter('reset')">Reset</button>
    <button class="btn btn-green" (click)="handleCounter('minus')">Decreament</button>
  </div>
</div>
