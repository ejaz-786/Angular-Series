<div>
  <h1>Control flow component</h1>
  <!-- 
  @if (value > 5) {
    <div style="width: 100px; height: 100px; background-color: red"></div>
  } -->
  <div>
    <button (click)="toggleDiv()">{{ display ? 'hide' : 'show' }}</button>
  </div>

  @if (display) {
    <div style="width: 100px; height: 100px; background-color: red"></div>
  }

  <br />

  <button (click)="togleColour()">toggleColour</button>

  @if (toggle) {
    <div style="width: 100px; height: 100px; background-color: blue; border-radius: 100%"></div>
  } @else {
    <div style="width: 100px; height: 100px; background-color: green; border-radius: 100%"></div>
  }
  <br />
  <div>
    <button (click)="handleColor('1')">green</button>
    <button (click)="handleColor('2')">red</button>
    <button (click)="handleColor('3')">yellow</button>
    <button (click)="handleColor('4')">pink</button>
    <input
      type="text"
      placeholder="Enter your color code"
      value="{{ colorValue }}"
      (input)="changeEvent($event)"
    />
  </div>
  <br />

  <div style="display: flex; gap: 10px">
    @if (colorCode === '1') {
      <div style="width: 50px; height: 50px; background-color: green"></div>
    } @else if (colorCode === '2') {
      <div style="width: 50px; height: 50px; background-color: red"></div>
    } @else if (colorCode === '3') {
      <div style="width: 50px; height: 50px; background-color: yellow"></div>
    } @else {
      <div style="width: 50px; height: 50px; background-color: pink"></div>
    }
  </div>
</div>
